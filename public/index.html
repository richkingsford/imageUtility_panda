<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Utility Panda v1</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="panel page-header">
        <p class="eyebrow">Gallery</p>
        <h1 class="page-title">Image Utility Panda</h1>
        <p class="page-copy">Browse every generated image with its matching post copy and prompt.</p>
        <p id="status-line" class="status-line page-status">Loading gallery data...</p>
      </header>

      <section id="gallery" class="gallery" aria-live="polite">
        <article id="empty-state" class="panel empty-card">
          <p class="empty-state">No gallery items are available yet.</p>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
